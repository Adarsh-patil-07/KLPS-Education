let currentDifficulty = 'easy';
let currentQuestionIndex = 0;
let currentWordData = null;
let missingLetterIndex = 0;

window.updateStarsDisplay = function updateStarsDisplay() {
    let stars = localStorage.getItem('sparky_stars') || '0';
    document.getElementById('stars-display').innerHTML = `⭐ ${stars}`;
}

window.saveProgress = function saveProgress() {
    localStorage.setItem('sparky_letterDrop', JSON.stringify({
        difficulty: currentDifficulty,
        questionIndex: currentQuestionIndex
    }));
}

window.initGame = function initGame() {
    let saved = localStorage.getItem('sparky_letterDrop');
    if (saved) {
        let data = JSON.parse(saved);
        currentDifficulty = data.difficulty;
        if(currentDifficulty === 'class1' || currentDifficulty === 'easy') currentDifficulty = 'easy';
        if(currentDifficulty === 'class2' || currentDifficulty === 'medium') currentDifficulty = 'medium';
        if(currentDifficulty === 'class3' || currentDifficulty === 'hard') currentDifficulty = 'hard';

        currentQuestionIndex = data.questionIndex;
    }
    updateStarsDisplay();
    loadQuestion();
}

window.loadQuestion = function loadQuestion() {
    let studentClass = localStorage.getItem('sparky_grade') || "1";
    studentClass = studentClass.replace('Class', '').trim();
    const words = WORD_BANK[studentClass][currentDifficulty];
    if (currentQuestionIndex >= words.length) {
        levelUp();
        return;
    }

    currentWordData = words[currentQuestionIndex];
    missingLetterIndex = Math.floor(Math.random() * currentWordData.word.length);
    
    let displayTitle = '';
    if(currentDifficulty === 'easy') displayTitle = 'Easy';
    else if(currentDifficulty === 'medium') displayTitle = 'Medium';
    else if(currentDifficulty === 'hard') displayTitle = 'Hard';
    
    document.getElementById('level-title').innerText = `Level: ${displayTitle}`;
    document.getElementById('level-subtitle').innerText = `Question ${currentQuestionIndex + 1} / ${words.length}`;
    
    const progressPercent = (currentQuestionIndex / words.length) * 100;
    document.getElementById('progress-fill').style.width = `${progressPercent}%`;

    const imgContainer = document.getElementById('subject-image-container');
    imgContainer.innerHTML = `<div class="text-[120px] md:text-[150px] animate-float leading-none select-none">${currentWordData.emoji}</div>`;
    
    const wordContainer = document.getElementById('word-container');
    wordContainer.innerHTML = '';
    
    const wordParts = currentWordData.word.split('');
    wordParts.forEach((letter, index) => {
        if (index === missingLetterIndex) {
            const dropzone = document.createElement('div');
            dropzone.id = 'dropzone';
            dropzone.className = "w-16 h-20 md:w-20 md:h-24 border-4 border-dashed border-primary-container rounded-lg bg-surface-container-low flex items-center justify-center relative overflow-hidden transition-all mx-1";
            dropzone.innerHTML = `<span class="material-symbols-outlined text-primary-container opacity-30 text-4xl">add_circle</span>`;
            wordContainer.appendChild(dropzone);
        } else {
            const span = document.createElement('span');
            span.innerText = letter;
            wordContainer.appendChild(span);
        }
    });
    
    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    
    const correctLetter = wordParts[missingLetterIndex];
    let options = [correctLetter];
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    while (options.length < 4) {
        let rand = alphabet[Math.floor(Math.random() * alphabet.length)];
        if (!options.includes(rand)) {
            options.push(rand);
        }
    }
    options.sort(() => Math.random() - 0.5);
    
    const textColors = ['text-secondary', 'text-error', 'text-primary', 'text-tertiary'];
    
    options.forEach((opt, i) => {
        const card = document.createElement('div');
        card.className = `w-16 h-20 md:w-20 md:h-24 bg-white border-2 border-surface-variant rounded-lg flex items-center justify-center font-display-lg-mobile ${textColors[i % 4]} bubbly-shadow cursor-grab active:cursor-grabbing  transition-all active-press select-none`;
        card.draggable = true;
        card.innerText = opt;
        card.dataset.letter = opt;
        optionsContainer.appendChild(card);
    });
    
    setupDragAndDrop();
}

window.handleAttempt = function handleAttempt(letterDropped) {
    if (letterDropped === currentWordData.word[missingLetterIndex]) {
        handleWin();
    } else {
        const dropzone = document.getElementById('dropzone');
        handleError(dropzone);
    }
}

window.setupDragAndDrop = function setupDragAndDrop() {
    const cards = document.querySelectorAll('[draggable="true"]');
    const dropzone = document.getElementById('dropzone');
    let draggedLetter = null;

    cards.forEach(card => {
        card.addEventListener('dragstart', (e) => {
            draggedLetter = card.dataset.letter;
            card.classList.add('opacity-50', 'scale-110');
            e.dataTransfer.setData('text/plain', draggedLetter);
        });

        card.addEventListener('dragend', () => {
            card.classList.remove('opacity-50', 'scale-110');
        });
        
        card.addEventListener('click', () => {
            handleAttempt(card.dataset.letter);
        });
    });

    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('bg-primary-fixed', 'border-solid', 'scale-110');
    });

    dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('bg-primary-fixed', 'border-solid', 'scale-110');
    });

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('bg-primary-fixed', 'border-solid', 'scale-110');
        const letterDropped = draggedLetter || e.dataTransfer.getData('text/plain');
        handleAttempt(letterDropped);
    });
}

window.handleWin = function handleWin() {
    const winFeedback = document.createElement('div');
    winFeedback.className = "fixed inset-0 pointer-events-none flex items-center justify-center z-[100] bg-on-surface/30 backdrop-blur-sm transition-all";
    winFeedback.innerHTML = `
        <div class="bg-white p-12 rounded-3xl bubbly-shadow border-4 border-tertiary flex flex-col items-center animate-bounce">
            <span class="material-symbols-outlined text-9xl text-tertiary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            <h2 class="font-display-lg text-tertiary mt-4 text-center">AMAZING!</h2>
        </div>
    `;
    document.body.appendChild(winFeedback);
    
    setTimeout(() => {
        winFeedback.remove();
        
        let stars = parseInt(localStorage.getItem('sparky_stars') || '0');
        localStorage.setItem('sparky_stars', stars + 1);
        let masteryData = JSON.parse(localStorage.getItem('mastery_data') || '{"english": 0, "math": 0, "evs": 0}');
        masteryData['english'] = Math.min(100, masteryData['english'] + 5);
        localStorage.setItem('mastery_data', JSON.stringify(masteryData));
        let weeklyData = JSON.parse(localStorage.getItem('weekly_stars') || '[0,0,0,0,0,0,0]');
        let dayIndex = new Date().getDay() - 1; 
        if (dayIndex < 0) dayIndex = 6;
        weeklyData[dayIndex] = Math.min(100, weeklyData[dayIndex] + 5);
        localStorage.setItem('weekly_stars', JSON.stringify(weeklyData));
        updateStarsDisplay();
        
        currentQuestionIndex++;
        saveProgress();
        loadQuestion();
    }, 1500);
}

window.handleError = function handleError(dropzone) {
    dropzone.classList.add('bg-error-container', 'border-error');
    dropzone.innerHTML = `<span class="material-symbols-outlined text-error opacity-100 text-4xl animate-bounce">cancel</span>`;
    
    dropzone.animate([
        { transform: 'translateX(0)' },
        { transform: 'translateX(-10px)' },
        { transform: 'translateX(10px)' },
        { transform: 'translateX(-10px)' },
        { transform: 'translateX(10px)' },
        { transform: 'translateX(0)' }
    ], { duration: 400 });

    setTimeout(() => {
        dropzone.classList.remove('bg-error-container', 'border-error');
        dropzone.innerHTML = `<span class="material-symbols-outlined text-primary-container opacity-30 text-4xl">add_circle</span>`;
    }, 800);
}

window.levelUp = function levelUp() {
    let nextDiff = '';
    let isComplete = false;
    if (currentDifficulty === 'easy') nextDiff = 'medium';
    else if (currentDifficulty === 'medium') nextDiff = 'hard';
    else {
        isComplete = true;
    }

    const modal = document.createElement('div');
    modal.className = "fixed inset-0 z-[100] bg-on-surface/60 backdrop-blur-sm flex items-center justify-center transition-all";
    
    if (isComplete) {
        modal.innerHTML = `
            <div class="bg-surface-container-lowest p-8 rounded-3xl border-4 border-primary text-center shadow-[0_8px_0_0_#7c5800] max-w-sm w-full mx-4 transform animate-bounce">
                <div class="w-24 h-24 bg-primary-container rounded-full mx-auto flex items-center justify-center mb-6">
                    <span class="text-6xl">🏆</span>
                </div>
                <h2 class="font-display-lg-mobile text-primary mb-2">You Won!</h2>
                <p class="font-body-lg text-on-surface-variant mb-8">You finished all words. You are a spelling champion!</p>
                <button id="finish-game-btn" class="w-full bg-primary text-white font-headline-md py-4 rounded-xl shadow-[0_4px_0_0_#5e4200] active:translate-y-1 active:shadow-none transition-all">
                    Back to Games
                </button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('finish-game-btn').addEventListener('click', () => {
            localStorage.setItem('sparky_letterDrop', JSON.stringify({ difficulty: 'easy', questionIndex: 0 }));
            window.location.href = 'learning_path.html';
        });
    } else {
        modal.innerHTML = `
            <div class="bg-surface-container-lowest p-8 rounded-3xl border-4 border-tertiary text-center shadow-[0_8px_0_0_#006d36] max-w-sm w-full mx-4 transform animate-bounce">
                <div class="w-24 h-24 bg-tertiary-container rounded-full mx-auto flex items-center justify-center mb-6">
                    <span class="text-6xl">🎉</span>
                </div>
                <h2 class="font-display-lg-mobile text-tertiary mb-2">Level Up!</h2>
                <p class="font-body-lg text-on-surface-variant mb-8">You unlocked CLASS ${nextDiff.replace('class', '')} difficulty!</p>
                <button id="next-level-btn" class="w-full bg-tertiary text-white font-headline-md py-4 rounded-xl shadow-[0_4px_0_0_#005227] active:translate-y-1 active:shadow-none transition-all">
                    Continue
                </button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('next-level-btn').addEventListener('click', () => {
            modal.remove();
            currentDifficulty = nextDiff;
            currentQuestionIndex = 0;
            saveProgress();
            loadQuestion();
        });
    }
}
