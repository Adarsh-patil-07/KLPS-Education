<!-- Micro-interactions Script -->


  <script>


        let selectedGrade = null;
        let selectedAvatar = null;

window.selectGrade = function selectGrade(element) {
            // Remove active class from all grade buttons
            document.querySelectorAll('section:nth-of-type(2) button').forEach(btn => {
                btn.classList.remove('selection-active');
            });
            // Add to current
            element.classList.add('selection-active');
            selectedGrade = element.innerText.replace('Class', '').trim();
            
            // Haptic-style feedback
            element.style.transform = "scale(0.95)";
            setTimeout(() => {
                element.style.transform = "translateY(4px) scale(1)";
            }, 100);
        }

window.selectAvatar = function selectAvatar(element) {
            // Remove active class from all avatars
            document.querySelectorAll('.avatar-option').forEach(btn => {
                btn.classList.remove('selection-active');
                btn.classList.remove('border-primary');
            });
            // Add to current
            element.classList.add('selection-active');
            selectedAvatar = element.querySelector('img').src;
            
            // Add celebratory effect
            createConfetti(element);
        }

window.createConfetti = function createConfetti(element) {
            const colors = ['#ffb800', '#00baff', '#4ade80', '#ba1a1a'];
            for (let i = 0; i < 8; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'absolute';
                confetti.style.width = '8px';
                confetti.style.height = '8px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = '50%';
                confetti.style.left = '50%';
                confetti.style.top = '50%';
                confetti.style.pointerEvents = 'none';
                
                element.appendChild(confetti);
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 40;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                const anim = confetti.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(${x}px, ${y}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });
                
                anim.onfinish = () => confetti.remove();
            }
        }

window.showCustomAlert = function showCustomAlert(message) {
            document.getElementById('custom-alert-message').innerText = message;
            const modal = document.getElementById('custom-alert');
            const box = document.getElementById('custom-alert-box');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-90');
            box.classList.add('scale-100');
        }

window.closeCustomAlert = function closeCustomAlert() {
            const modal = document.getElementById('custom-alert');
            const box = document.getElementById('custom-alert-box');
            modal.classList.add('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-100');
            box.classList.add('scale-90');
        }

window.validateAndStart = function validateAndStart() {
            const name = document.getElementById('student-name').value.trim();
            if (!name) {
                showCustomAlert("Please tell us your name!");
                return;
            }
            if (!selectedGrade) {
                showCustomAlert("Please pick your class!");
                return;
            }
            if (!selectedAvatar) {
                showCustomAlert("Please choose your Hero!");
                return;
            }
            
            // Save data for other pages
            localStorage.setItem('sparky_name', name);
            localStorage.setItem('sparky_grade', selectedGrade);
            localStorage.setItem('sparky_avatar', selectedAvatar);
            
            window.location.href = 'learning_path.html';
        }
    

  </script>
