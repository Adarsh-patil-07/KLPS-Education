let currentDifficulty = 'easy';
let currentQuestionIndex = 0;
let currentQuestionData = null;

window.updateStarsDisplay = function updateStarsDisplay() {
    let stars = localStorage.getItem('sparky_stars') || '0';
    document.getElementById('stars-display').innerHTML = `<span class="material-symbols-outlined">star</span> ${stars}`;
}

window.saveProgress = function saveProgress() {
    localStorage.setItem('sparky_quizTime', JSON.stringify({
        difficulty: currentDifficulty,
        questionIndex: currentQuestionIndex
    }));
}

window.initGame = function initGame() {
    let saved = localStorage.getItem('sparky_quizTime');
    if (saved) {
        let data = JSON.parse(saved);
        currentDifficulty = data.difficulty;
        if(currentDifficulty === 'class1' || currentDifficulty === 'easy') currentDifficulty = 'easy';
        if(currentDifficulty === 'class2' || currentDifficulty === 'medium') currentDifficulty = 'medium';
        if(currentDifficulty === 'class3' || currentDifficulty === 'hard') currentDifficulty = 'hard';

        currentQuestionIndex = data.questionIndex;
    }
    updateStarsDisplay();
    loadQuestion();
}

window.loadQuestion = function loadQuestion() {
    let studentClass = localStorage.getItem('sparky_grade') || "1";
    studentClass = studentClass.replace('Class', '').trim();
    const questions = QUIZ_BANK[studentClass][currentDifficulty];
    
    
    const btn1 = document.getElementById('btn-class1');
    const btn2 = document.getElementById('btn-class2');
    const btn3 = document.getElementById('btn-class3');

    const activeClass = "flex-1 py-3 px-4 rounded-md font-label-bold text-label-bold bg-primary-container text-on-primary-container inner-glow transition-all";
    const inactiveClass = "flex-1 py-3 px-4 rounded-md font-label-bold text-label-bold text-on-surface-variant transition-all";

    if (btn1) btn1.className = activeClass;
    if (btn2) btn2.className = currentDifficulty === 'medium' || currentDifficulty === 'hard' ? activeClass : inactiveClass;
    if (btn3) btn3.className = currentDifficulty === 'hard' ? activeClass : inactiveClass;

    if (currentDifficulty === 'easy') {
        if (btn1) btn1.innerHTML = `Easy <span class="block text-xs opacity-80">${currentQuestionIndex + 1}/${questions.length} Quizzes</span>`;
        if (btn2) btn2.innerHTML = `Medium <span class="block text-xs opacity-80">Locked</span>`;
        if (btn3) btn3.innerHTML = `Hard <span class="block text-xs opacity-80">Locked</span>`;
    } else if (currentDifficulty === 'medium') {
        if (btn1) btn1.innerHTML = `Easy <span class="block text-xs opacity-80">${questions.length}/${questions.length} Quizzes</span>`;
        if (btn2) btn2.innerHTML = `Medium <span class="block text-xs opacity-80">${currentQuestionIndex + 1}/${questions.length} Quizzes</span>`;
        if (btn3) btn3.innerHTML = `Hard <span class="block text-xs opacity-80">Locked</span>`;
    } else if (currentDifficulty === 'hard') {
        if (btn1) btn1.innerHTML = `Easy <span class="block text-xs opacity-80">${questions.length}/${questions.length} Quizzes</span>`;
        if (btn2) btn2.innerHTML = `Medium <span class="block text-xs opacity-80">${questions.length}/${questions.length} Quizzes</span>`;
        if (btn3) btn3.innerHTML = `Hard <span class="block text-xs opacity-80">${currentQuestionIndex + 1}/${questions.length} Quizzes</span>`;
    }
    
    // Removing old level-title updates since we set innerHTML directly
    
    if (currentDifficulty === 'medium' || currentDifficulty === 'hard') {
        document.getElementById('prog-circle-medium').className = "w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold bubbly-shadow";
        document.getElementById('prog-line-1').className = "h-2 flex-1 bg-primary-container rounded-full";
        document.getElementById('prog-line-2').className = "h-2 flex-1 bg-primary-container rounded-full progress-candy-stripe";
    }
    if (currentDifficulty === 'hard') {
        document.getElementById('prog-circle-hard').className = "w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold bubbly-shadow";
        document.getElementById('prog-line-2').className = "h-2 flex-1 bg-primary-container rounded-full";
    }

    if (currentQuestionIndex >= questions.length) {
        levelUp();
        return;
    }

    currentQuestionData = questions[currentQuestionIndex];
    
    
    
    const progressPercent = (currentQuestionIndex / questions.length) * 100;
    
    // Update progress bar
    document.querySelector('.w-32 .h-full').style.width = `${progressPercent}%`;

    const imgContainer = document.getElementById('subject-emoji-container');
    imgContainer.innerHTML = currentQuestionData.emoji;
    
    const questionContainer = document.getElementById('question-container');
    questionContainer.innerHTML = currentQuestionData.question;
    
    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    
    let options = [...currentQuestionData.options];
    options.sort(() => Math.random() - 0.5); // Shuffle
    
    options.forEach((opt) => {
        const btn = document.createElement('button');
        btn.className = "group bg-white border-2 border-outline-variant py-4 px-6 rounded-xl bubbly-shadow transition-all active:translate-y-2 active:shadow-none select-none";
        btn.onclick = () => handleSelect(btn, opt);
        btn.innerHTML = `<span class="font-headline-md text-primary block group-active:scale-95 transition-transform">${opt}</span>`;
        optionsContainer.appendChild(btn);
    });
}

window.handleSelect = function handleSelect(btn, word) {
    // Visual feedback for selection
    if(word === currentQuestionData.correct) {
        btn.classList.add('bg-tertiary-container', 'border-tertiary');
        
        // Disable all buttons
        const allBtns = document.getElementById('options-container').querySelectorAll('button');
        allBtns.forEach(b => b.onclick = null);
        
        // Trigger success modal overlay
        setTimeout(() => {
            const winFeedback = document.createElement('div');
            winFeedback.className = "fixed inset-0 pointer-events-none flex items-center justify-center z-[100] bg-on-surface/30 backdrop-blur-sm transition-all";
        let trophies = JSON.parse(localStorage.getItem('klps_trophies') || '{}');
        if (!trophies['math_whiz']) {
            trophies['math_whiz'] = true;
            localStorage.setItem('klps_trophies', JSON.stringify(trophies));
        }
        if (!trophies['first_steps']) {
            trophies['first_steps'] = true;
            localStorage.setItem('klps_trophies', JSON.stringify(trophies));
        }

            winFeedback.innerHTML = `
                <div class="bg-white p-8 md:p-12 rounded-3xl bubbly-shadow border-4 border-tertiary flex flex-col items-center animate-bounce mx-4">
                    <span class="text-6xl md:text-8xl mb-2">🎉</span>
                    <h2 class="font-display-lg text-tertiary mt-2 text-center">Great Job!</h2>
                </div>
            `;
            document.body.appendChild(winFeedback);
            
            setTimeout(() => {
                winFeedback.remove();
                
                let stars = parseInt(localStorage.getItem('sparky_stars') || '0');
                localStorage.setItem('sparky_stars', stars + 1);
                
                // Track problems solved for achievements
                let probsSolved = parseInt(localStorage.getItem('klps_problems_solved') || '0');
                localStorage.setItem('klps_problems_solved', probsSolved + 1);
                
                // Speedy Learner unlocks at 20 correct answers
                if (probsSolved + 1 >= 20) {
                    let trophies = JSON.parse(localStorage.getItem('klps_trophies') || '{}');
                    trophies['speedy_learner'] = true;
                    localStorage.setItem('klps_trophies', JSON.stringify(trophies));
                }

                let masteryData = JSON.parse(localStorage.getItem('mastery_data') || '{"english": 0, "math": 0, "evs": 0}');
                masteryData['evs'] = Math.min(100, masteryData['evs'] + 5);
                localStorage.setItem('mastery_data', JSON.stringify(masteryData));
                let weeklyData = JSON.parse(localStorage.getItem('weekly_stars') || '[0,0,0,0,0,0,0]');
                let dayIndex = new Date().getDay() - 1; 
                if (dayIndex < 0) dayIndex = 6;
                weeklyData[dayIndex] = Math.min(100, weeklyData[dayIndex] + 5);
                localStorage.setItem('weekly_stars', JSON.stringify(weeklyData));
                updateStarsDisplay();
                
                currentQuestionIndex++;
                saveProgress();
                loadQuestion();
            }, 1500);
        }, 500);
    } else {
        btn.classList.add('bg-error-container', 'border-error');
        let struggles = JSON.parse(localStorage.getItem('klps_struggles') || '[]');
        struggles.push({ subject: 'Mathematics', topic: "Arithmetic", timestamp: Date.now() });
        localStorage.setItem('klps_struggles', JSON.stringify(struggles));

        setTimeout(() => {
            btn.classList.remove('bg-error-container', 'border-error');
        }, 500);
    }
}

window.levelUp = function levelUp() {
    let nextDiff = '';
    let nextDiffDisplay = '';
    let isComplete = false;
    
    if (currentDifficulty === 'easy') {
        nextDiff = 'medium';
        nextDiffDisplay = 'Medium';
        document.getElementById('btn-class2').classList.remove('text-on-surface-variant');
        document.getElementById('btn-class2').classList.add('bg-primary-container', 'text-on-primary-container', 'inner-glow');
        document.getElementById('btn-class2').innerHTML = 'Medium <span class="block text-xs opacity-80">0/20 Quizzes</span>';
        document.getElementById('prog-circle-medium').classList.remove('bg-surface-variant', 'text-on-surface-variant', 'border-2', 'border-outline-variant');
        document.getElementById('prog-circle-medium').classList.add('bg-primary-container', 'text-on-primary-container', 'bubbly-shadow');
        document.getElementById('prog-line-1').classList.remove('progress-candy-stripe');
        document.getElementById('prog-line-2').classList.add('progress-candy-stripe');
    } else if (currentDifficulty === 'medium') {
        nextDiff = 'hard';
        nextDiffDisplay = 'Hard';
        document.getElementById('btn-class3').classList.remove('text-on-surface-variant');
        document.getElementById('btn-class3').classList.add('bg-primary-container', 'text-on-primary-container', 'inner-glow');
        document.getElementById('btn-class3').innerHTML = 'Hard <span class="block text-xs opacity-80">0/20 Quizzes</span>';
        document.getElementById('prog-circle-hard').classList.remove('bg-surface-variant', 'text-on-surface-variant', 'border-2', 'border-outline-variant');
        document.getElementById('prog-circle-hard').classList.add('bg-primary-container', 'text-on-primary-container', 'bubbly-shadow');
        document.getElementById('prog-line-2').classList.remove('progress-candy-stripe');
    } else {
        isComplete = true;
    }

    const modal = document.createElement('div');
    modal.className = "fixed inset-0 z-[100] bg-on-surface/60 backdrop-blur-sm flex items-center justify-center transition-all";
    
    if (isComplete) {
        modal.innerHTML = `
            <div class="bg-surface-container-lowest p-8 rounded-3xl border-4 border-primary text-center shadow-[0_8px_0_0_#7c5800] max-w-sm w-full mx-4 transform animate-bounce">
                <div class="w-24 h-24 bg-primary-container rounded-full mx-auto flex items-center justify-center mb-6">
                    <span class="text-6xl">🏆</span>
                </div>
                <h2 class="font-display-lg-mobile text-primary mb-2">You Won!</h2>
                <p class="font-body-lg text-on-surface-variant mb-8">You finished all questions. You are a quiz champion!</p>
                <button id="finish-game-btn" class="w-full bg-primary text-white font-headline-md py-4 rounded-xl shadow-[0_4px_0_0_#5e4200] active:translate-y-1 active:shadow-none transition-all">
                    Back to Games
                </button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('finish-game-btn').addEventListener('click', () => {
            localStorage.setItem('sparky_quizTime', JSON.stringify({ difficulty: 'easy', questionIndex: 0 }));
            window.location.href = 'learning_path.html';
        });
    } else {
        modal.innerHTML = `
            <div class="bg-surface-container-lowest p-8 rounded-3xl border-4 border-tertiary text-center shadow-[0_8px_0_0_#006d36] max-w-sm w-full mx-4 transform animate-bounce">
                <div class="w-24 h-24 bg-tertiary-container rounded-full mx-auto flex items-center justify-center mb-6">
                    <span class="text-6xl">🎉</span>
                </div>
                <h2 class="font-display-lg-mobile text-tertiary mb-2">Level Up!</h2>
                <p class="font-body-lg text-on-surface-variant mb-8">You unlocked ${nextDiffDisplay} quizzes!</p>
                <button id="next-level-btn" class="w-full bg-tertiary text-white font-headline-md py-4 rounded-xl shadow-[0_4px_0_0_#005227] active:translate-y-1 active:shadow-none transition-all">
                    Continue
                </button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('next-level-btn').addEventListener('click', () => {
            modal.remove();
            currentDifficulty = nextDiff;
            currentQuestionIndex = 0;
            saveProgress();
            loadQuestion();
        });
    }
}

initGame();


  </script>
